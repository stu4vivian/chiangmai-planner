const TRIPKEY='cnx-trip-id';
let syncCtl=null;    // 同步控制器（連上線後才有）
const KEY='cnx-proto-v10', OLDKEY='cnx-proto-v9';
let DB=load(), places=DB.places, plan=DB.plan, manualLines=DB.manualLines, settings=DB.settings, typeIcons=DB.typeIcons, typeColors=DB.typeColors;
function load(){
  try{
    const r=localStorage.getItem(KEY);
    if(r){ const d=JSON.parse(r); if(d&&d.places) return CNXCore.migrate(d); }
    const old=localStorage.getItem(OLDKEY);
    if(old){ const od=JSON.parse(old); if(od&&od.places){ const mig=CNXCore.migrate(od); localStorage.setItem(KEY,JSON.stringify(mig)); return mig; } } // 讀舊寫新，舊 key 留作備份
  }catch(e){}
  return CNXCore.migrate({places:JSON.parse(JSON.stringify(SEED_PLACES)),plan:seedPlan()});
}
function getLocalDb(){ return {schemaVersion:CNXCore.SCHEMA_VERSION, places, plan, manualLines, settings, typeIcons, typeColors}; }
function applyDb(db){
  const m=CNXCore.migrate(db);
  places=m.places; plan=m.plan; manualLines=m.manualLines; settings=m.settings; typeIcons=m.typeIcons; typeColors=m.typeColors;
  localStorage.setItem(KEY, JSON.stringify(getLocalDb()));
  renderAll();   // renderAll() 內已含 renderLegend()/renderMarkers()
}
function save(){
  localStorage.setItem(KEY, JSON.stringify(getLocalDb()));   // 本機立即持久（離線快取）
  if(syncCtl) syncCtl.scheduleSave();                        // 有連線才排同步
}
function tcolor(t){ return typeColors[t]||(TYPES[t]||TYPES['其他']).c; }
function temoji(t){ return typeIcons[t]||(TYPES[t]||TYPES['其他']).e; }
function placeEmoji(p){ return (p&&p.icon)?p.icon:temoji(p.type); }
function getPlace(id){ return places.find(p=>p.id===id); }
function uid(){ return 'x'+(Math.round(performance.now()*1000)%1e9)+''+Math.round(performance.now()%997); }
function makePlace(partial){ return CNXCore.normalizePlace(Object.assign({id:uid()},partial||{})); }
function notLocated(p){ return !(p&&p.lat&&p.lng); } // 沒座標、不在地圖上（僅顯示提示用）
function gmaps(p){
  const term=(p.en&&/[a-zA-Z]/.test(p.en))?p.en:p.name;
  if(p.lat&&p.lng) return 'https://www.google.com/maps/search/'+encodeURIComponent(term)+'/@'+p.lat+','+p.lng+',17z';
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(term+' Chiang Mai');
}
function placeSched(id){ return plan.filter(e=>e.placeId===id).map(e=>{const d=DAYS.find(x=>x.id===e.day);return d.label+' '+slotObj(e.slot).label;}); }

let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),2600); }

async function geocode(p){
  const q=(p.en&&/[a-zA-Z]/.test(p.en))?p.en:p.name;
  toast('定位中：'+p.name+' …');
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q+' Chiang Mai Thailand'));
    const j=await r.json();
    if(j&&j[0]){ p.lat=parseFloat(j[0].lat); p.lng=parseFloat(j[0].lon); save(); renderMarkers(); toast('已放上地圖：'+p.name+'（可再校正）'); return true; }
    toast('查不到「'+p.name+'」。填英文名重試，或用「在地圖點選位置」手動標');
  }catch(e){ toast('定位失敗（網路？）。可用「在地圖點選位置」手動標'); }
  return false;
}

const armbar=document.getElementById('armbar'), armtext=document.getElementById('armtext');
function arm(id){ ARMED=id; PINNING=null; const p=getPlace(id); armtext.innerHTML=`正在安排：<b>${esc(p?p.name:'')}</b> — 點任一格放入`; armbar.classList.add('on'); document.body.classList.add('arming'); document.body.classList.remove('pinning'); switchRight('ov'); }
function pinStart(id){ PINNING=id; ARMED=null; const p=getPlace(id); armtext.innerHTML=`點地圖設定 <b>${esc(p?p.name:'')}</b> 的位置`; armbar.classList.add('on'); document.body.classList.add('pinning'); document.body.classList.remove('arming'); toast('點地圖上的位置來標這個點'); }
function disarm(){ ARMED=null; PINNING=null; armbar.classList.remove('on'); document.body.classList.remove('arming'); document.body.classList.remove('pinning'); }
function placeArmed(day,slot){ if(!ARMED) return; if(!plan.some(e=>e.placeId===ARMED&&e.day===day&&e.slot===slot)) plan.push({id:uid(),placeId:ARMED,day,slot}); disarm(); afterChange(); }

function renderMatrixInto(id,days){
  let cols='<colgroup><col class="slcol">'+days.map(()=>'<col class="daycol">').join('')+'</colgroup>';
  let h=cols+'<tr><th class="corner"></th>'+days.map(d=>`<th class="${STAY_CLASS[d.stay]}">${d.label}<br><span class="zc">${d.wd}·${d.stay}</span></th>`).join('')+'</tr>';
  SLOTS.forEach(slot=>{
    h+=`<tr class="${slot.kind}"><td class="sl ${slot.kind}">${slot.kind==='meal'?'🍽 ':slot.kind==='stay'?'🏨 ':''}${slot.label}${slot.ctx?'<br><span class="ctx">'+slot.ctx+'</span>':''}</td>`+days.map(d=>{
      const ok=STAY_OK[d.stay]||[];
      const entries=plan.filter(e=>e.day===d.id&&e.slot===slot.key);
      const inner=entries.map(e=>{
        const p=getPlace(e.placeId); if(!p) return '';
        const cross=slot.kind!=='stay'&&p.type!=='其他'&&p.area&&p.area!=='其他'&&!ok.includes(p.area);
        return `<div class="mi" data-action="occ" data-eid="${e.id}" style="border-left-color:${tcolor(p.type)}">${placeEmoji(p)} ${esc(p.name)}${p.tentative?' <span class="cx">待定</span>':''}${cross?' <span class="cx">跨</span>':''}</div>`;
      }).join('');
      return `<td class="c ${STAY_CLASS[d.stay]}" data-action="cell" data-day="${d.id}" data-slot="${slot.key}">${inner||'<span class="cempty">＋</span>'}</td>`;
    }).join('')+'</tr>';
  });
  const el=document.getElementById(id); el.innerHTML=h; el.style.minWidth=''; el.style.width=(38+days.length*128+5*(days.length+2))+'px';
}
function renderMatrix(){ renderMatrixInto('matrixA',DAYS.slice(0,6)); renderMatrixInto('matrixB',DAYS.slice(6)); }

let map,markers=[],mapTypes=new Set(),mapDays=new Set(),mapSched=false;
function initMap(){
  if(map){ setTimeout(()=>map.invalidateSize(),60); renderMarkers(); return; }
  map=L.map('mapview').setView([18.79,98.985],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  map.on('click',e=>{ if(PINNING){ const p=getPlace(PINNING); if(p){ p.lat=e.latlng.lat; p.lng=e.latlng.lng; const nm=p.name; disarm(); save(); renderMarkers(); toast('已標位置：'+nm); } } });
  renderMapDayFilter(); renderMarkers(); renderLegend();
}
function renderMapDayFilter(){
  const el=document.getElementById('mapdaywrap'); if(!el) return;
  el.innerHTML='<span style="flex:none;color:#a59c8b">📅 顯示</span>'
   +`<span class="chip ${(!mapSched&&mapDays.size===0)?'on':''}" data-action="mapday" data-day="__all">全部</span>`
   +`<span class="chip ${mapSched?'on':''}" data-action="mapday" data-day="__sched">已排入</span>`
   +DAYS.map(d=>`<span class="chip ${mapDays.has(d.id)?'on':''}" data-action="mapday" data-day="${d.id}">${d.label}</span>`).join('');
}
function renderLegend(){
  document.getElementById('maplegend').innerHTML='<span style="flex:none;color:#a59c8b">類別</span>'
   +`<span class="chip ${mapTypes.size===0?'on':''}" data-action="maptype" data-type="__all">全部</span>`
   +Object.keys(TYPES).map(t=>`<span class="chip ${mapTypes.has(t)?'on':''}" data-action="maptype" data-type="${t}"><i style="width:10px;height:10px;border-radius:50%;background:${tcolor(t)};display:inline-block;margin-right:3px"></i>${temoji(t)}${t}</span>`).join('');
}
function renderMarkers(){
  if(!map) return;
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  places.filter(p=>{
    if(!(p.lat&&p.lng)) return false;
    if(!(mapTypes.size===0||mapTypes.has(p.type))) return false;
    if(mapSched) return CNXCore.isScheduled(p.id,plan);
    if(mapDays.size===0) return true;
    return plan.some(e=>e.placeId===p.id&&mapDays.has(e.day));
  }).forEach(p=>{
    const icon=L.divIcon({className:'',html:`<div class="maplabel" style="border-left-color:${tcolor(p.type)}">${placeEmoji(p)} ${esc(p.name)}</div>`,iconSize:[null,null],iconAnchor:[0,9]});
    const m=L.marker([p.lat,p.lng],{icon,riseOnHover:true}).addTo(map);
    const sc=placeSched(p.id);
    m.bindPopup(`<b>${esc(p.name)}</b> <span style="color:#888">${esc(p.en||'')}</span><br>
      <span style="color:${tcolor(p.type)}">●</span>${p.type} · ${p.area}<br>🕑 ${esc(p.hours||'—')}<br>💵 ${esc(p.price||'—')}<br>📝 ${esc(p.note||'—')}<br>
      ${sc.length?'📅 '+sc.join('、'):'<span style="color:#999">尚未排入</span>'}<br>
      <a href="${gmaps(p)}" target="_blank" rel="noopener">🗺️ Google Maps</a><span class="poparm" data-action="arm" data-id="${p.id}">📅 排入行程</span>`);
    markers.push(m);
  });
}

function renderList(){
  const areaOrder=Object.keys(AREAS);
  let html='';
  Object.keys(TYPES).forEach(type=>{
    if(fTypes.size&&!fTypes.has(type)) return;
    const inType=places.filter(p=>p.type===type&&(fAreas.size===0||fAreas.has(p.area)));
    if(!inType.length) return;
    html+=`<div class="section"><div class="sechdr">${temoji(type)} ${type} <span class="cnt">（${inType.length}）</span></div>`;
    areaOrder.forEach(area=>{
      const inArea=inType.filter(p=>p.area===area);
      if(!inArea.length) return;
      html+=`<div class="subhdr"><span class="gdot" style="background:${acolor(area)}"></span>${area} <span class="cnt">· ${inArea.length}</span></div><div class="grid">${inArea.map(cardHTML).join('')}</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('listgrid').innerHTML=html||'<div class="sd" style="margin-top:16px;color:#a59c8b">（沒有符合的卡片）</div>';
}

async function importJSON(text){
  let d; try{ d=JSON.parse(text); }catch(e){ toast('JSON 格式有誤，無法匯入'); return; }
  const inPlaces=Array.isArray(d)?d:(d.places||[]);
  if(!inPlaces.length){ toast('沒有可匯入的 places'); return; }
  let added=0,updated=0; const touched=[];
  inPlaces.forEach(ip=>{
    if(!ip||!ip.name) return;
    let ex=ip.id?getPlace(ip.id):places.find(p=>p.name===ip.name);
    if(ex){ Object.assign(ex,ip); Object.assign(ex,CNXCore.normalizePlace(ex)); updated++; touched.push(ex); }
    else { const np=CNXCore.normalizePlace(Object.assign({id:ip.id||uid()},ip)); places.push(np); added++; touched.push(np); }
  });
  if(d.plan&&Array.isArray(d.plan)){ d.plan.forEach(e=>{ if(!plan.some(x=>x.id===e.id)) plan.push(e); }); }
  afterChange(); closeSheet();
  const need=touched.filter(p=>!(p.lat&&p.lng));
  toast(`匯入完成：新增 ${added}、更新 ${updated}${need.length?'，自動定位中…':''}`);
  for(const p of need){ await geocode(p); }  // 沒座標的自動上地圖
}

}
let lastSync='—';
function syncStatusText(s){ return s==='synced'?'已同步':s==='syncing'?'同步中…':s==='offline'?'離線（已存本機）':'—'; }
function setSyncStatus(s){ lastSync=s; const el=document.getElementById('syncStatus'); if(el) el.textContent=syncStatusText(s); }
function syncLink(){ const id=localStorage.getItem(TRIPKEY); return id?location.origin+location.pathname+'#t='+id:''; }
function copySyncLink(){ const l=syncLink(); if(!l){ toast('尚未連上雲端'); return; } navigator.clipboard.writeText(l).then(()=>toast('連結已複製')).catch(()=>toast(l)); }
function openSettings(){
  const syncBlock = SYNC_URL ? `<div class="seclabel">雲端同步</div><div class="sd">🔗 把同步連結傳給旅伴即可一起編輯。狀態：<span id="syncStatus">${syncStatusText(lastSync)}</span></div><div class="row"><span class="pill pri" data-action="copy-link">📋 複製同步連結</span></div>` : '';
  let h=`<h3>⚙ 設定</h3><div class="sd">資料與外觀</div>
  ${syncBlock}
  <div class="seclabel">資料</div><div class="row"><span class="pill" data-action="impexp">⤒⤓ 匯入／匯出</span><span class="pill danger" data-action="reset">↺ 重設成初始</span></div>
  <div class="seclabel">外觀</div><div class="row"><span class="pill" data-action="icons">🎨 類別圖示／顏色</span></div>
  <div class="row" style="margin-top:14px"><span class="pill" data-action="close">關閉</span></div>`;
  openSheet(h);
}
function renderAll(){ renderMatrix(); renderFilters(); renderList(); if(map){ renderLegend(); renderMarkers(); } }
renderAll(); initMap();
async function initSync(){
  if(!SYNC_URL || !SYNC_ANON) return;                 // 尚未設定 → 維持純本機
  const client = CNXSync.makeClient(SYNC_URL, SYNC_ANON);
  let tripId = (location.hash.match(/t=([0-9a-f-]{36})/)||[])[1] || localStorage.getItem(TRIPKEY) || '';
  try{
    if(!tripId){                                       // 首次：用目前本機資料種一份到雲端
      tripId = await client.createTrip(getLocalDb());
      localStorage.setItem(TRIPKEY, tripId);
      if(!location.hash) location.hash = 't='+tripId;
    } else { localStorage.setItem(TRIPKEY, tripId); }
    syncCtl = CNXSync.createSyncController({
      client, tripId, getLocalDb, applyDb, mergeDb:CNXCore.mergeDb, onStatus:setSyncStatus
    });
    await syncCtl.load();                              // 拉雲端最新覆蓋本機畫面
    syncCtl.startPolling();
  }catch(e){ setSyncStatus('offline'); }
}
initSync();
</script>
